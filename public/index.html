<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Vivien的花园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 50%, #d4e9d6 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: rgba(255,255,255,0.95); border-radius: 24px; padding: 35px 40px; width: 100%; max-width: 520px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #5a4a3a; margin-bottom: 25px; font-size: 26px; }
    .tab { display: flex; margin-bottom: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #e8ddd0; }
    .tab button { flex: 1; padding: 12px; border: none; background: #faf5ef; cursor: pointer; font-size: 15px; transition: all 0.3s; color: #8a7a6a; }
    .tab button.active { background: #c4a882; color: white; font-weight: 600; }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form.hidden { display: none; }
    input, textarea { padding: 13px 16px; border: 2px solid #e8ddd0; border-radius: 12px; font-size: 15px; outline: none; transition: border 0.3s; background: #fcf9f5; }
    input:focus, textarea:focus { border-color: #c4a882; }
    textarea { resize: vertical; min-height: 70px; }
    button.submit { padding: 13px; background: #c4a882; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
    button.submit:hover { background: #b69775; transform: translateY(-1px); }
    .msg { text-align: center; color: #d4766a; font-size: 14px; min-height: 20px; }
    .msg.success { color: #6a9d7a; }
    .dashboard { display: none; }
    .dashboard.show { display: block; }
    .user-info { background: #f8f4ee; padding: 16px 20px; border-radius: 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .user-info .left p { margin: 3px 0; color: #6a5a4a; font-size: 14px; }
    .user-info .left strong { color: #4a3a2a; }
    .logout { background: #d4a8a0; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background 0.3s; }
    .logout:hover { background: #c4978f; }
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .nav-tabs button { flex: 1; padding: 10px; border: 2px solid #e8ddd0; background: #faf5ef; border-radius: 10px; cursor: pointer; font-size: 14px; color: #8a7a6a; transition: all 0.3s; }
    .nav-tabs button.active { border-color: #c4a882; background: #c4a882; color: white; }
    .nav-section { display: none; }
    .nav-section.show { display: block; }

    /* 搜索区域突出显示 */
    .search-area { background: #f8f4ee; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .search-area .search-title { font-size: 14px; color: #8a7a6a; margin-bottom: 10px; font-weight: 500; }
    .search-row { display: flex; gap: 10px; }
    .search-row input { flex: 1; }
    .search-row button { padding: 13px 20px; background: #6a9d7a; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 15px; transition: all 0.3s; white-space: nowrap; }
    .search-row button:hover { background: #5a8d6a; }
    .search-result { margin-top: 12px; max-height: 200px; overflow-y: auto; }
    .search-result .item { padding: 10px; background: white; border-radius: 8px; margin-bottom: 6px; border: 1px solid #e8ddd0; }
    .search-result .item .name { font-weight: 600; color: #4a3a2a; }
    .search-result .item .desc { font-size: 13px; color: #8a7a6a; margin-top: 2px; }
    .search-result .item .owner { font-size: 12px; color: #b69775; }
    .search-result .empty { text-align: center; color: #b0a090; padding: 20px; }

    .props-list { max-height: 260px; overflow-y: auto; }
    .prop-item { background: #f8f4ee; padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .prop-item .info { flex: 1; }
    .prop-item .name { font-weight: 600; color: #4a3a2a; }
    .prop-item .desc { font-size: 13px; color: #8a7a6a; margin-top: 2px; }
    .prop-item .del { background: #d4a8a0; color: white; border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: background 0.3s; }
    .prop-item .del:hover { background: #c4978f; }
    .section-title { font-size: 16px; color: #5a4a3a; margin: 0 0 12px 0; font-weight: 600; }
    /* === 手机端适配 === */
@media (max-width: 480px) {
  .container { padding: 20px 18px; }
  h1 { font-size: 22px; }
  .nav-tabs { flex-wrap: wrap; gap: 6px; }
  .nav-tabs button { font-size: 13px; padding: 9px 6px; min-width: 0; flex: 1 1 auto; }
  .search-row { flex-direction: column; gap: 8px; }
  .search-row button { width: 100%; text-align: center; }
  .search-area { padding: 15px; }
  .user-info { flex-direction: column; text-align: center; gap: 10px; }
  .user-info .left p { font-size: 13px; }
  .logout { align-self: center; }
  #navSettings div[style*="display:flex"] { flex-direction: column; }
  #navSettings button { width: 100%; }
  .prop-item { flex-direction: column; gap: 8px; text-align: center; }
  .prop-item .del { width: 100%; }
}
  </style>
</head>
<body>
  <div class="container">
    <h1>🌸 Vivien的花园</h1>

    <!-- 登录/注册 -->
    <div id="authView">
      <div class="tab">
        <button id="tabLogin" class="active" onclick="switchTab('login')">登录</button>
        <button id="tabRegister" onclick="switchTab('register')">注册</button>
      </div>

      <form id="loginForm" class="form" onsubmit="handleLogin(event)">
        <input type="text" id="loginUsername" placeholder="用户名" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <div class="msg" id="loginMsg"></div>
        <button type="submit" class="submit">🌸 进入花园</button>
      </form>

      <form id="registerForm" class="form hidden" onsubmit="handleRegister(event)">
        <input type="text" id="regUsername" placeholder="用户名" required>
        <input type="password" id="regPassword" placeholder="密码" required>
        <div class="msg" id="regMsg"></div>
        <button type="submit" class="submit">🌸 注册账号</button>
      </form>
    </div>

    <!-- 主面板 -->
    <div id="dashboardView" class="dashboard">
      <div class="user-info">
        <div class="left">
          <p>👤 <strong id="displayName"></strong></p>
          <p>🏆 积分: <strong id="displayScore">0</strong></p>
        </div>
        <button class="logout" onclick="handleLogout()">退出</button>
      </div>

      <!-- 导航菜单 -->
      <div class="nav-tabs">
        <button class="active" onclick="switchNav('search')">🔍 搜花</button>
        <button onclick="switchNav('myFlowers')">🌷 我的花</button>
        <button onclick="switchNav('add')">🌸 录入</button>
        <button onclick="switchNav('settings')">⚙️ 设置</button>
      </div>

      <!-- 搜索（最突出） -->
      <div id="navSearch" class="nav-section show">
        <div class="search-area">
          <div class="search-title">🔍 搜索花园里的鲜花</div>
          <div class="search-row">
            <input type="text" id="searchKeyword" placeholder="输入花名或描述..." onkeydown="if(event.key==='Enter')searchProps()">
            <button onclick="searchProps()">搜索</button>
          </div>
          <div class="search-result" id="searchResult">
            <div class="empty">输入关键词，搜索全园鲜花</div>
          </div>
        </div>
      </div>

      <!-- 我的鲜花 -->
      <div id="navMyFlowers" class="nav-section">
        <div class="section-title">🌷 我的鲜花</div>
        <div class="props-list" id="propsList">
          <p style="color:#b0a090;text-align:center;padding:20px">还没有鲜花，去录入吧 🌸</p>
        </div>
      </div>

      <!-- 录入鲜花 -->
      <div id="navAdd" class="nav-section">
        <div class="section-title">🌸 录入鲜花</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <input type="text" id="propName" placeholder="鲜花名称">
          <textarea id="propDesc" placeholder="鲜花描述（颜色、香味、花语...）"></textarea>
          <button class="submit" onclick="addProp()">🌸 录入到花园</button>
        </div>
      </div>

      <!-- 设置 -->
      <div id="navSettings" class="nav-section">
        <div class="section-title">⚙️ 个人设置</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;gap:10px">
            <input type="text" id="newUsername" placeholder="新用户名" style="flex:1">
            <button class="submit" onclick="updateUsername()" style="padding:13px 18px;font-size:14px;white-space:nowrap">改名</button>
          </div>
          <div style="display:flex;gap:10px">
            <input type="password" id="newPassword" placeholder="新密码" style="flex:1">
            <button class="submit" onclick="updatePassword()" style="padding:13px 18px;font-size:14px;white-space:nowrap">改密码</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('token');

    function switchTab(t) {
      ['login','register'].forEach(x => {
        document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1)).className = t===x?'active':'';
        document.getElementById(x+'Form').className = t===x?'form':'form hidden';
      });
    }

    function switchNav(n) {
      document.querySelectorAll('.nav-tabs button').forEach(b => b.className='');
      document.querySelector(`.nav-tabs button[onclick*="${n}"]`).className = 'active';
      document.querySelectorAll('.nav-section').forEach(s => s.classList.remove('show'));
      document.getElementById('nav'+n.charAt(0).toUpperCase()+n.slice(1)).classList.add('show');
    }

    function showMsg(el, text, ok) { el.textContent = text; el.className = 'msg' + (ok?' success':''); }

    async function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
      const msg = document.getElementById('loginMsg'); showMsg(msg, '登录中...');
      try {
        const r = await fetch(API+'/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
        const d = await r.json();
        if (r.ok) { token=d.token; localStorage.setItem('token', d.token); showDashboard(d.user); }
        else showMsg(msg, d.error);
      } catch(e) { showMsg(msg, '网络错误'); }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const u = document.getElementById('regUsername').value, p = document.getElementById('regPassword').value;
      const msg = document.getElementById('regMsg'); showMsg(msg, '注册中...');
      try {
        const r = await fetch(API+'/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
        const d = await r.json();
        if (r.ok) { token=d.token; localStorage.setItem('token', d.token); showDashboard(d.user); }
        else showMsg(msg, d.error);
      } catch(e) { showMsg(msg, '网络错误'); }
    }

    function showDashboard(user) {
      document.getElementById('authView').style.display = 'none';
      document.getElementById('dashboardView').classList.add('show');
      document.getElementById('displayName').textContent = user.username;
      document.getElementById('displayScore').textContent = user.score || 0;
      loadProps();
    }

    function handleLogout() { token=null; localStorage.removeItem('token'); document.getElementById('authView').style.display='block'; document.getElementById('dashboardView').classList.remove('show'); }

    async function loadProps() {
      try {
        const r = await fetch(API+'/api/props/mine', { headers:{'Authorization':'Bearer '+token} });
        if (!r.ok) throw Error();
        const list = document.getElementById('propsList');
        const props = await r.json();
        if (!props.length) { list.innerHTML = '<p style="color:#b0a090;text-align:center;padding:20px">还没有鲜花，去录入吧 🌸</p>'; return; }
        list.innerHTML = props.map(p => `
          <div class="prop-item">
            <div class="info">
              <div class="name">🌷 ${p.propName}</div>
              <div class="desc">${p.propDesc}</div>
            </div>
            <button class="del" onclick="deleteProp(${p.id})">删除</button>
          </div>
        `).join('');
      } catch(e) { document.getElementById('propsList').innerHTML = '<p style="color:#d4766a;text-align:center;padding:20px">加载失败</p>'; }
    }

    async function addProp() {
      const n = document.getElementById('propName').value, d = document.getElementById('propDesc').value;
      if (!n) { alert('请输入鲜花名称'); return; }
      try {
        const r = await fetch(API+'/api/props', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify({propName:n,propDesc:d}) });
        const res = await r.json();
        if (r.ok) { document.getElementById('propName').value=''; document.getElementById('propDesc').value=''; loadProps(); alert('🌸 鲜花已录入花园！'); switchNav('myFlowers'); }
        else alert(res.error);
      } catch(e) { alert('网络错误'); }
    }

    async function deleteProp(id) {
      if (!confirm('确定要移除这朵花吗？')) return;
      try {
        const r = await fetch(API+'/api/props/'+id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} });
        if (r.ok) loadProps(); else alert('删除失败');
      } catch(e) { alert('网络错误'); }
    }

    async function searchProps() {
      const q = document.getElementById('searchKeyword').value.trim();
      const box = document.getElementById('searchResult');
      if (!q) { box.innerHTML = '<div class="empty">输入关键词，搜索全园鲜花</div>'; return; }
      box.innerHTML = '<div class="empty">搜索中...</div>';
      try {
        const r = await fetch(API+'/api/props/search?q='+encodeURIComponent(q));
        const props = await r.json();
        if (!props.length) { box.innerHTML = '<div class="empty">🌱 没有找到匹配的鲜花</div>'; return; }
        box.innerHTML = props.map(p => `
          <div class="item">
            <div class="name">🌷 ${p.propName}</div>
            <div class="desc">${p.propDesc}</div>
            <div class="owner">👤 ${p.ownerName || '未知'}</div>
          </div>
        `).join('');
      } catch(e) { box.innerHTML = '<div class="empty">搜索失败</div>'; }
    }

    async function updateUsername() {
      const n = document.getElementById('newUsername').value;
      if (!n) { alert('请输入新用户名'); return; }
      try {
        const r = await fetch(API+'/api/user/username', { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify({newUsername:n}) });
        const d = await r.json();
        if (r.ok) { token=d.token; localStorage.setItem('token',d.token); document.getElementById('displayName').textContent=n; document.getElementById('newUsername').value=''; alert('✅ 用户名已更新'); }
        else alert(d.error);
      } catch(e) { alert('网络错误'); }
    }

    async function updatePassword() {
      const p = document.getElementById('newPassword').value;
      if (!p) { alert('请输入新密码'); return; }
      try {
        const r = await fetch(API+'/api/user/password', { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify({newPassword:p}) });
        const d = await r.json();
        if (r.ok) { document.getElementById('newPassword').value=''; alert('✅ 密码已更新'); }
        else alert(d.error);
      } catch(e) { alert('网络错误'); }
    }

    // 自动登录
    if (token) {
      fetch(API+'/api/user/profile', { headers:{'Authorization':'Bearer '+token} })
        .then(r=>r.json()).then(u=>{ if(u.id) showDashboard(u); else { token=null; localStorage.removeItem('token'); } })
        .catch(()=>{ token=null; localStorage.removeItem('token'); });
    }
  </script>
</body>
</html>
