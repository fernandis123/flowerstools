<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字化工具 - 道具管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
    .tab { display: flex; margin-bottom: 25px; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .tab button { flex: 1; padding: 12px; border: none; background: #f5f5f5; cursor: pointer; font-size: 16px; transition: all 0.3s; }
    .tab button.active { background: #667eea; color: white; }
    .form { display: flex; flex-direction: column; gap: 15px; }
    .form.hidden { display: none; }
    input { padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; transition: border 0.3s; }
    input:focus { border-color: #667eea; }
    button.submit { padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
    button.submit:hover { transform: translateY(-2px); }
    .msg { text-align: center; color: #e74c3c; font-size: 14px; min-height: 20px; }
    .msg.success { color: #27ae60; }
    .dashboard { display: none; }
    .dashboard.show { display: block; }
    .user-info { background: #f8f9ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .user-info p { margin: 5px 0; color: #555; }
    .user-info strong { color: #333; }
    .logout { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; float: right; }
    .section-title { font-size: 18px; color: #333; margin: 20px 0 10px; }
    textarea { padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; resize: vertical; min-height: 80px; outline: none; }
    textarea:focus { border-color: #667eea; }
    .props-list { max-height: 300px; overflow-y: auto; }
    .prop-item { background: #f8f9ff; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .prop-item .info { flex: 1; }
    .prop-item .name { font-weight: bold; color: #333; }
    .prop-item .desc { font-size: 13px; color: #666; margin-top: 3px; }
    .prop-item .del { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .link-btn { background: none; border: none; color: #667eea; cursor: pointer; text-decoration: underline; padding: 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ 数字化工具</h1>

    <!-- 登录/注册 -->
    <div id="authView">
      <div class="tab">
        <button id="tabLogin" class="active" onclick="switchTab('login')">登录</button>
        <button id="tabRegister" onclick="switchTab('register')">注册</button>
      </div>

      <form id="loginForm" class="form" onsubmit="handleLogin(event)">
        <input type="text" id="loginUsername" placeholder="用户名" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <div class="msg" id="loginMsg"></div>
        <button type="submit" class="submit">登录</button>
      </form>

      <form id="registerForm" class="form hidden" onsubmit="handleRegister(event)">
        <input type="text" id="regUsername" placeholder="用户名" required>
        <input type="password" id="regPassword" placeholder="密码" required>
        <div class="msg" id="regMsg"></div>
        <button type="submit" class="submit">注册</button>
      </form>
    </div>

    <!-- 主面板 -->
    <div id="dashboardView" class="dashboard">
      <div class="user-info">
        <button class="logout" onclick="handleLogout()">退出</button>
        <p>👤 <strong id="displayName"></strong></p>
        <p>🏆 积分: <strong id="displayScore">0</strong></p>
      </div>

      <div class="section-title">📝 修改个人信息</div>
      <div style="display:flex;gap:10px;margin-bottom:15px">
        <input type="text" id="newUsername" placeholder="新用户名" style="flex:1">
        <button class="submit" onclick="updateUsername()" style="padding:10px;font-size:14px">改名</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px">
        <input type="password" id="newPassword" placeholder="新密码" style="flex:1">
        <button class="submit" onclick="updatePassword()" style="padding:10px;font-size:14px">改密码</button>
      </div>

      <div class="section-title">➕ 录入道具</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
        <input type="text" id="propName" placeholder="道具名称">
        <textarea id="propDesc" placeholder="道具描述"></textarea>
        <button class="submit" onclick="addProp()">录入道具</button>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:10px">
        <input type="text" id="searchKeyword" placeholder="搜索道具..." style="flex:1">
        <button class="submit" onclick="searchProps()" style="padding:10px;font-size:14px">搜索</button>
      </div>

      <div class="section-title">📋 我的道具</div>
      <div class="props-list" id="propsList">
        <p style="color:#999;text-align:center">暂无道具</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('token');

    function switchTab(tab) {
      document.getElementById('tabLogin').className = tab === 'login' ? 'active' : '';
      document.getElementById('tabRegister').className = tab === 'register' ? 'active' : '';
      document.getElementById('loginForm').className = tab === 'login' ? 'form' : 'form hidden';
      document.getElementById('registerForm').className = tab === 'register' ? 'form' : 'form hidden';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const msg = document.getElementById('loginMsg');
      msg.className = 'msg';
      try {
        const r = await fetch(API_BASE + '/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const d = await r.json();
        if (r.ok) { token = d.token; localStorage.setItem('token', d.token); showDashboard(d.user); }
        else { msg.textContent = d.error; }
      } catch(e) { msg.textContent = '网络错误'; }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;
      const msg = document.getElementById('regMsg');
      msg.className = 'msg';
      try {
        const r = await fetch(API_BASE + '/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const d = await r.json();
        if (r.ok) { token = d.token; localStorage.setItem('token', d.token); showDashboard(d.user); }
        else { msg.textContent = d.error; }
      } catch(e) { msg.textContent = '网络错误'; }
    }

    async function showDashboard(user) {
      document.getElementById('authView').style.display = 'none';
      document.getElementById('dashboardView').classList.add('show');
      document.getElementById('displayName').textContent = user.username;
      document.getElementById('displayScore').textContent = user.score || 0;
      document.getElementById('propsList').innerHTML = '<p style="color:#999;text-align:center">加载中...</p>';
      loadProps();
    }

    function handleLogout() {
      token = null; localStorage.removeItem('token');
      document.getElementById('authView').style.display = 'block';
      document.getElementById('dashboardView').classList.remove('show');
    }

    async function loadProps() {
      try {
        const r = await fetch(API_BASE + '/api/props/mine', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!r.ok) throw new Error();
        const props = await r.json();
        const list = document.getElementById('propsList');
        if (!props.length) { list.innerHTML = '<p style="color:#999;text-align:center">暂无道具</p>'; return; }
        list.innerHTML = props.map(p => `
          <div class="prop-item">
            <div class="info">
              <div class="name">${p.propName}</div>
              <div class="desc">${p.propDesc}</div>
            </div>
            <button class="del" onclick="deleteProp(${p.id})">删除</button>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('propsList').innerHTML = '<p style="color:#e74c3c;text-align:center">加载失败</p>';
      }
    }

    async function addProp() {
      const name = document.getElementById('propName').value;
      const desc = document.getElementById('propDesc').value;
      if (!name || !desc) { alert('请填写完整'); return; }
      try {
        const r = await fetch(API_BASE + '/api/props', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ propName: name, propDesc: desc }) });
        const d = await r.json();
        if (r.ok) { document.getElementById('propName').value = ''; document.getElementById('propDesc').value = ''; loadProps(); }
        else { alert(d.error); }
      } catch(e) { alert('网络错误'); }
    }

    async function deleteProp(id) {
      if (!confirm('确定删除？')) return;
      try {
        const r = await fetch(API_BASE + '/api/props/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        if (r.ok) loadProps(); else alert('删除失败');
      } catch(e) { alert('网络错误'); }
    }

    async function searchProps() {
      const q = document.getElementById('searchKeyword').value.trim();
      if (!q) { loadProps(); return; }
      try {
        const r = await fetch(API_BASE + '/api/props/search?q=' + encodeURIComponent(q));
        const props = await r.json();
        const list = document.getElementById('propsList');
        if (!props.length) { list.innerHTML = '<p style="color:#999;text-align:center">未找到匹配道具</p>'; return; }
        list.innerHTML = props.map(p => `
          <div class="prop-item">
            <div class="info">
              <div class="name">${p.propName} <span style="font-size:12px;color:#999">- ${p.ownerName || '未知'}</span></div>
              <div class="desc">${p.propDesc}</div>
            </div>
          </div>
        `).join('');
      } catch(e) { alert('搜索失败'); }
    }

    async function updateUsername() {
      const name = document.getElementById('newUsername').value;
      if (!name) { alert('请输入新用户名'); return; }
      try {
        const r = await fetch(API_BASE + '/api/user/username', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ newUsername: name }) });
        const d = await r.json();
        if (r.ok) { token = d.token; localStorage.setItem('token', d.token); document.getElementById('displayName').textContent = name; document.getElementById('newUsername').value = ''; alert('用户名已更新'); }
        else { alert(d.error); }
      } catch(e) { alert('网络错误'); }
    }

    async function updatePassword() {
      const pwd = document.getElementById('newPassword').value;
      if (!pwd) { alert('请输入新密码'); return; }
      try {
        const r = await fetch(API_BASE + '/api/user/password', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ newPassword: pwd }) });
        const d = await r.json();
        if (r.ok) { document.getElementById('newPassword').value = ''; alert('密码已更新'); }
        else { alert(d.error); }
      } catch(e) { alert('网络错误'); }
    }

    // 自动登录
    if (token) {
      fetch(API_BASE + '/api/user/profile', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(u => { if (u.id) showDashboard(u); else { token = null; localStorage.removeItem('token'); } })
        .catch(() => { token = null; localStorage.removeItem('token'); });
    }
  </script>
</body>
</html>
